<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>A Letter for Yu</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="background"></div>

<canvas id="stars"></canvas>

<div id="petals"></div>



<!-- BAŞLANGIÇ -->

<div id="startScreen" class="screen">

<p id="intro">

I'm sorry...

</p>

<div id="envelopeContainer">

<div id="envelope">

<div id="envelopeBack"></div>

<div id="letter">

<p>

I'm sorry if I hurt you lately.

</p>

<span>(click)</span>

</div>

<div id="flap"></div>

<div id="front"></div>

</div>

</div>

</div>



<!-- GIF -->

<div id="gifScreen" class="screen hidden">

<img id="gifImage">

</div>



<!-- MISS -->

<div id="missScreen"

class="screen hidden">

<h1>

I miss you.

</h1>

</div>



<!-- OKAY -->

<div id="okayScreen"

class="screen hidden">

<h1>

Can we be okay again?

</h1>

<button class="movingBtn">

Yes ❤️

</button>

<button class="movingBtn">

Of course yes ❤️

</button>

<button class="movingBtn">

Definitely yes ❤️

</button>

</div>



<!-- CAT -->

<div id="catScreen"

class="screen hidden">

<h1>

Can I be your cat?

</h1>

<button id="catYes">

❤️ Yes

</button>

<button id="catNo">

💔 No

</button>

</div>



<canvas id="confettiCanvas"></canvas>

<script src="script.js"></script>

</body>

</html>
