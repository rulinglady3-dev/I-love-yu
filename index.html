<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Love You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

canvas{
display:block;
position:fixed;
left:0;
top:0;
}

#yu{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-family:'Dancing Script',cursive;

font-size:72px;

font-weight:bold;

color:white;

text-shadow:
0 0 8px rgba(255,255,255,.25);

pointer-events:none;

user-select:none;

z-index:5;

}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="yu">yu</div>

<script src="script.js"></script>

</body>
</html>
